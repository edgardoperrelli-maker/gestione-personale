<!doctype html>
<html lang="it" class="dark">
<!--
  MOCKUP throwaway per brainstorming redesign rapportino digitale (/r/[token]).
  NON è codice di produzione. Palette Aurea inlinata da app/globals.css.
  v2 — modifiche richieste:
    * header FISSO nella lista: in scroll si muove solo l'elenco interventi
    * riepilogo accanto a nome/data: esiti positivi/negativi + totali lavorazioni (dinamici)
  Mostra: vista LISTA (header fisso + riepilogo + filtro + lista scrollabile)
          vista FOCUS (sommario + menu a tendina "Dettagli" + compilazione + avanti/indietro)
-->
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Rapportino — mockup redesign</title>
<style>
  :root{
    --brand-bg: oklch(0.14 0.04 245);
    --brand-surface: oklch(0.18 0.05 245);
    --brand-surface-muted: oklch(0.16 0.045 245);
    --brand-primary: oklch(0.80 0.16 215);
    --brand-primary-hover: oklch(0.72 0.16 215);
    --brand-primary-soft: oklch(0.80 0.16 215 / 0.15);
    --brand-border: oklch(0.30 0.03 245);
    --brand-border-strong: oklch(0.38 0.04 245);
    --brand-text-main: oklch(0.94 0.015 220);
    --brand-text-muted: oklch(0.70 0.03 245);
    --brand-text-subtle: oklch(0.55 0.03 245);
    --success: oklch(0.74 0.21 145);
    --success-soft: oklch(0.74 0.21 145 / 0.16);
    --danger: oklch(0.70 0.25 350);
    --danger-soft: oklch(0.70 0.25 350 / 0.16);
    --gold: oklch(0.84 0.18 95);
    --gold-soft: oklch(0.84 0.18 95 / 0.16);
    --shadow-hover: 0 0 18px oklch(0.80 0.16 215 / 0.45);
    --radius-lg: 16px;
    --radius-xl: 20px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; height:100%; }
  body{
    font-family: "Geist", system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--brand-text-main);
    line-height: 1.35;
    background:
      radial-gradient(circle at top left, oklch(0.78 0.13 215 / 0.16), transparent 38%),
      radial-gradient(circle at top right, oklch(0.66 0.22 350 / 0.10), transparent 42%),
      linear-gradient(180deg, oklch(0.14 0.04 245) 0%, oklch(0.10 0.04 245) 100%);
    background-attachment: fixed;
  }
  .app{ max-width: 480px; margin:0 auto; height:100dvh; position:relative; }
  .screen{ display:none; flex-direction:column; height:100dvh; }
  .screen.active{ display:flex; }

  .eyebrow{ font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--brand-text-subtle); }
  .muted{ color:var(--brand-text-muted); }
  .subtle{ color:var(--brand-text-subtle); }

  /* ---- HEADER FISSO lista ---- */
  .head{ flex:0 0 auto; margin:12px 14px 0; background:var(--brand-surface); border:1px solid var(--brand-border); border-radius:var(--radius-xl); padding:14px 16px; box-shadow:0 2px 10px rgba(0,0,0,.45); }
  .headtop{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
  .head h1{ margin:.1em 0 0; font-size:19px; font-weight:800; }
  .head .data{ font-size:13px; color:var(--brand-text-muted); white-space:nowrap; }

  /* riepilogo */
  .riep{ display:flex; flex-wrap:wrap; gap:6px; margin-top:11px; }
  .pill{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; padding:5px 10px; border-radius:999px; }
  .pill .n{ font-size:13.5px; }
  .pill.ok{ background:var(--success-soft); color:var(--success); }
  .pill.ko{ background:var(--danger-soft); color:var(--danger); }
  .pill.todo{ background:var(--brand-surface-muted); color:var(--brand-text-subtle); border:1px solid var(--brand-border); }
  .lavrow{ display:flex; flex-wrap:wrap; gap:6px; margin-top:7px; }
  .lav{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; padding:4px 9px; border-radius:8px; background:var(--brand-surface-muted); border:1px solid var(--brand-border); color:var(--brand-text-muted); }
  .lav b{ color:var(--brand-primary); }

  .track{ margin-top:11px; height:7px; border-radius:999px; background:var(--brand-surface-muted); overflow:hidden; border:1px solid var(--brand-border); }
  .fill{ height:100%; background:linear-gradient(90deg, var(--brand-primary), var(--success)); box-shadow:0 0 10px var(--brand-primary); transition:width .3s; }

  /* filtro */
  .seg{ flex:0 0 auto; display:flex; gap:6px; margin:12px 14px 4px; background:var(--brand-surface-muted); border:1px solid var(--brand-border); border-radius:999px; padding:4px; }
  .seg button{ flex:1; border:none; background:transparent; color:var(--brand-text-muted); font:inherit; font-size:13px; font-weight:600; padding:8px 6px; border-radius:999px; cursor:pointer; min-height:38px; }
  .seg button.on{ background:var(--brand-primary-soft); color:var(--brand-primary); }

  /* ---- LISTA scrollabile (solo questa si muove) ---- */
  .list{ flex:1 1 auto; overflow-y:auto; padding:8px 14px 110px; display:flex; flex-direction:column; gap:10px; }
  /* scrollbar a tema Aurea (non grigia) */
  .list, .fscroll{ scrollbar-width: thin; scrollbar-color: oklch(0.80 0.16 215 / 0.55) transparent; }
  .list::-webkit-scrollbar, .fscroll::-webkit-scrollbar{ width:8px; }
  .list::-webkit-scrollbar-track, .fscroll::-webkit-scrollbar-track{ background:transparent; }
  .list::-webkit-scrollbar-thumb, .fscroll::-webkit-scrollbar-thumb{ background:oklch(0.80 0.16 215 / 0.55); border-radius:999px; border:2px solid transparent; background-clip:padding-box; }
  .list::-webkit-scrollbar-thumb:hover, .fscroll::-webkit-scrollbar-thumb:hover{ background:var(--brand-primary); }
  .row{ width:100%; text-align:left; display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:var(--radius-lg);
        background:var(--brand-surface); border:1px solid var(--brand-border); color:inherit; font:inherit; cursor:pointer; transition:border-color .15s, box-shadow .15s; }
  .row:active{ border-color:var(--brand-primary); box-shadow:var(--shadow-hover); }
  .row[data-stato="fatto"]{ border-left:3px solid var(--success); }
  .row[data-stato="nonfatto"]{ border-left:3px solid var(--danger); }
  .num{ flex:0 0 auto; width:30px; height:30px; border-radius:999px; display:grid; place-items:center; font-size:13px; font-weight:700; background:var(--brand-primary-soft); color:var(--brand-primary); }
  .row[data-stato="fatto"] .num{ background:var(--success-soft); color:var(--success); }
  .row[data-stato="nonfatto"] .num{ background:var(--danger-soft); color:var(--danger); }
  .rowmid{ flex:1 1 auto; min-width:0; }
  .rownameline{ display:flex; min-width:0; align-items:baseline; gap:6px; }
  .rowname{ min-width:0; flex:1 1 auto; font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rowmeta{ flex:0 0 auto; white-space:nowrap; font-size:11.5px; font-weight:500; color:var(--brand-text-muted); }
  .rowsubline{ display:flex; align-items:center; gap:8px; margin-top:2px; }
  .rowsub{ flex:1 1 auto; min-width:0; font-size:12.5px; color:var(--brand-text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rowsub .dot{ opacity:.5; margin:0 5px; }
  .chip{ flex:0 0 auto; display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:999px; }
  .chip.fatto{ background:var(--success-soft); color:var(--success); }
  .chip.nonfatto{ background:var(--danger-soft); color:var(--danger); }
  .chip.dafare{ background:var(--brand-surface-muted); color:var(--brand-text-subtle); border:1px solid var(--brand-border); }
  .chev{ flex:0 0 auto; color:var(--brand-text-subtle); }

  /* ---- barra azione sticky ---- */
  .actionbar{ position:fixed; left:0; right:0; bottom:0; z-index:5; }
  .actionbar .inner{ max-width:480px; margin:0 auto; padding:12px 14px calc(12px + env(safe-area-inset-bottom));
        background:oklch(0.12 0.04 245 / 0.92); backdrop-filter:blur(10px); border-top:1px solid var(--brand-border); display:flex; gap:10px; align-items:center; }
  .btn{ flex:1; border:none; font:inherit; font-weight:700; font-size:16px; padding:14px; border-radius:14px; cursor:pointer; min-height:50px; }
  .btn-primary{ background:var(--brand-primary); color:oklch(0.16 0.06 245); box-shadow:0 0 16px oklch(0.80 0.16 215 / .35); }
  .btn-primary:active{ background:var(--brand-primary-hover); }
  .btn-ghost{ flex:0 0 auto; background:var(--brand-surface); color:var(--brand-text-main); border:1px solid var(--brand-border-strong); padding:14px 18px; border-radius:14px; min-height:50px; font-weight:700; cursor:pointer; }
  .actionhint{ font-size:12px; color:var(--brand-text-muted); text-align:center; padding:0 16px 6px; }

  /* ---- FOCUS ---- */
  .fbar{ flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 14px 10px; }
  .back{ display:inline-flex; align-items:center; gap:6px; background:transparent; border:none; color:var(--brand-primary); font:inherit; font-weight:600; font-size:14px; cursor:pointer; padding:6px 4px; }
  .pos{ font-size:13px; font-weight:700; color:var(--brand-text-muted); background:var(--brand-surface); border:1px solid var(--brand-border); border-radius:999px; padding:5px 12px; }
  .fscroll{ flex:1 1 auto; overflow-y:auto; padding:0 14px 110px; }
  .fcard{ background:var(--brand-surface); border:1px solid var(--brand-border); border-radius:var(--radius-xl); padding:18px; box-shadow:0 2px 10px rgba(0,0,0,.45); }
  .fcard[data-stato="fatto"]{ border-color:var(--success); }
  .fcard[data-stato="nonfatto"]{ border-color:var(--danger); }
  .ftop{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .ftitle{ font-size:21px; font-weight:800; }
  .savebadge{ font-size:11.5px; font-weight:600; padding:4px 9px; border-radius:999px; background:var(--success-soft); color:var(--success); white-space:nowrap; }
  .summary{ margin-top:10px; display:flex; flex-direction:column; gap:6px; font-size:14.5px; }
  .summary .line{ display:flex; align-items:center; gap:9px; }
  .summary svg{ flex:0 0 auto; color:var(--brand-primary); }

  details.dett{ margin-top:14px; border:1px solid var(--brand-border); border-radius:14px; background:var(--brand-surface-muted); overflow:hidden; }
  details.dett>summary{ list-style:none; cursor:pointer; padding:13px 15px; font-size:13.5px; font-weight:600; color:var(--brand-text-muted); display:flex; align-items:center; justify-content:space-between; min-height:46px; }
  details.dett>summary::-webkit-details-marker{ display:none; }
  details.dett>summary .twist{ transition:transform .2s; }
  details.dett[open]>summary .twist{ transform:rotate(180deg); }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; padding:4px 15px 16px; }
  .grid .k{ font-size:10.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--brand-text-subtle); }
  .grid .v{ font-size:14px; margin-top:1px; word-break:break-word; }

  .fields{ margin-top:18px; display:flex; flex-direction:column; gap:14px; }
  .flabel{ font-size:12px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--brand-text-muted); margin-bottom:7px; display:block; }
  select, textarea{ width:100%; font:inherit; font-size:16px; padding:13px 14px; border-radius:12px; background:var(--brand-surface-muted); color:var(--brand-text-main); border:1px solid var(--brand-border); min-height:50px; }
  select:focus, textarea:focus{ outline:none; border-color:var(--brand-primary); box-shadow:0 0 0 1px var(--brand-primary); }
  .eseguito-si{ border-color:var(--success) !important; }
  .eseguito-no{ border-color:var(--danger) !important; }
  .checks{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .check{ display:flex; align-items:center; gap:10px; padding:13px; border-radius:12px; border:1px solid var(--brand-border); background:var(--brand-surface-muted); cursor:pointer; font-size:14px; font-weight:600; min-height:50px; user-select:none; }
  .check.on{ border-color:var(--brand-primary); background:var(--brand-primary-soft); color:var(--brand-primary); }
  .box{ width:22px; height:22px; border-radius:6px; border:2px solid var(--brand-border-strong); display:grid; place-items:center; flex:0 0 auto; }
  .check.on .box{ background:var(--brand-primary); border-color:var(--brand-primary); color:oklch(0.16 0.06 245); }
  .box svg{ opacity:0; }
  .check.on .box svg{ opacity:1; }

  .toast{ position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px); opacity:0; pointer-events:none; z-index:9;
          background:var(--success); color:oklch(0.16 0.06 245); font-weight:700; font-size:13.5px; padding:9px 16px; border-radius:999px; transition:.25s; box-shadow:0 6px 20px rgba(0,0,0,.4); }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- ============ LISTA ============ -->
  <section id="list" class="screen active">
    <div class="head">
      <p class="eyebrow">Rapportino</p>
      <div class="headtop">
        <h1>Mario Rossi</h1>
        <span class="data">4 giu 2026</span>
      </div>
      <div class="riep" id="riep"></div>
      <div class="lavrow" id="lavrow"></div>
      <div class="track"><div class="fill" id="pfill" style="width:0%"></div></div>
    </div>

    <div class="seg" id="seg">
      <button class="on" data-f="tutti">Tutti</button>
      <button data-f="dafare">Da fare</button>
      <button data-f="fatti">Completati</button>
    </div>

    <div class="list" id="rows"></div>
  </section>

  <!-- ============ FOCUS ============ -->
  <section id="focus" class="screen">
    <div class="fbar">
      <button class="back" onclick="toList()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
        Tutti gli interventi
      </button>
      <span class="pos" id="pos">1 / 12</span>
    </div>
    <div class="fscroll"><div class="fcard" id="fcard"></div></div>
  </section>

  <div class="actionbar" id="abar"></div>
  <div class="toast" id="toast">Salvato ✓</div>
</div>

<script>
const VOCI = [
  {nome:'BIANCHI MARIO', via:'Via Roma 12', comune:'FIRENZE', cap:'50100', fascia:'05/06/2026 08:00', matricola:'MIT0032010111001', pdr:'00594201700001', odsin:'20043820001', recapito:'3331112221', attivita:'S-PR-053 A', access:'NO', stato:'fatto', lav:{'CAMBIO':true}},
  {nome:'ROMANELLI ROSANNA', via:'Via Pier Luigi da Palestrina 17', comune:'FIRENZE', cap:'50144', fascia:'08:00', matricola:'MIT0032010228254', pdr:'00594201753235', odsin:'20043824268', recapito:'3313652495', attivita:'S-PR-053 A', access:'NO', stato:'fatto', lav:{'CAMBIO':true,'MINI BAG':true}},
  {nome:'GARCIA FIGUEROA CINDY TATIANA', via:'Viale Europa 88', comune:'FIRENZE', cap:'50126', fascia:'05/06/2026 08:30', matricola:'MIT0032010332170', pdr:'00594201766012', odsin:'20043829910', recapito:'3402233445', attivita:'S-PR-061 B', access:'SÌ', stato:'nonfatto', lav:{}},
  {nome:'ESPOSITO LUCA', via:'Via Senese 4', comune:'FIRENZE', cap:'50124', fascia:'09:00', matricola:'MIT0032010440099', pdr:'00594201788123', odsin:'20043831200', recapito:'3489001122', attivita:'S-PR-053 A', access:'NO', stato:'fatto', lav:{'RG STOP':true}},
  {nome:'FERRARI ANNA', via:'Via dei Mille 23', comune:'FIRENZE', cap:'50132', fascia:'09:30', matricola:'MIT0032010551234', pdr:'00594201790234', odsin:'20043833445', recapito:'3471234567', attivita:'S-PR-061 B', access:'NO', stato:'dafare', lav:{}},
  {nome:'GALLO MARCO', via:'Via Aretina 210', comune:'FIRENZE', cap:'50136', fascia:'10:00', matricola:'MIT0032010662345', pdr:'00594201712345', odsin:'20043835678', recapito:'3386677889', attivita:'S-PR-053 A', access:'SÌ', stato:'dafare', lav:{}},
  {nome:'RICCI SARA', via:'Via Bolognese 145', comune:'FIRENZE', cap:'50139', fascia:'10:30', matricola:'MIT0032010773456', pdr:'00594201723456', odsin:'20043837890', recapito:'3399988776', attivita:'S-PR-061 B', access:'NO', stato:'dafare', lav:{}},
  {nome:'MARINO PAOLO', via:'Via Pisana 67', comune:'SCANDICCI', cap:'50018', fascia:'11:00', matricola:'MIT0032010884567', pdr:'00594201734567', odsin:'20043840012', recapito:'3201122334', attivita:'S-PR-053 A', access:'NO', stato:'dafare', lav:{}},
  {nome:'GRECO ELENA', via:'Via Roma 9', comune:'SESTO F.NO', cap:'50019', fascia:'11:30', matricola:'MIT0032010995678', pdr:'00594201745678', odsin:'20043842234', recapito:'3455566778', attivita:'S-PR-061 B', access:'SÌ', stato:'dafare', lav:{}},
  {nome:'BRUNO DAVIDE', via:'Via Garibaldi 34', comune:'CAMPI B.ZIO', cap:'50013', fascia:'12:00', matricola:'MIT0032011006789', pdr:'00594201756789', odsin:'20043844456', recapito:'3477788990', attivita:'S-PR-053 A', access:'NO', stato:'dafare', lav:{}},
  {nome:'COSTA VALENTINA', via:'Via Mazzini 12', comune:'FIRENZE', cap:'50121', fascia:'12:30', matricola:'MIT0032011117890', pdr:'00594201767890', odsin:'20043846678', recapito:'3388899001', attivita:'S-PR-061 B', access:'NO', stato:'dafare', lav:{}},
  {nome:'RIZZO ANDREA', via:'Via Cavour 56', comune:'FIRENZE', cap:'50129', fascia:'13:00', matricola:'MIT0032011228901', pdr:'00594201778901', odsin:'20043848890', recapito:'3499900112', attivita:'S-PR-053 A', access:'SÌ', stato:'dafare', lav:{}},
];
const CROCETTE = ['CAMBIO','MINI BAG','RG STOP','RC STOP'];
const LAV_LABEL = {'CAMBIO':'Cambio','MINI BAG':'Mini bag','RG STOP':'RG stop','RC STOP':'RC stop'};
let current = 0, filter = 'tutti';

const $ = (s)=>document.querySelector(s);
const statoLabel = {fatto:'Fatto', nonfatto:'Non fatto', dafare:'Da fare'};

function riepilogo(){
  let fatti=0, nonfatti=0, dafare=0; const lav={};
  VOCI.forEach(v=>{
    if(v.stato==='fatto') fatti++; else if(v.stato==='nonfatto') nonfatti++; else dafare++;
    CROCETTE.forEach(c=>{ if(v.lav && v.lav[c]) lav[c]=(lav[c]||0)+1; });
  });
  return {fatti,nonfatti,dafare,lav};
}

function renderHeader(){
  const r = riepilogo(), done = r.fatti + r.nonfatti, tot = VOCI.length;
  $('#riep').innerHTML =
    `<span class="pill ok"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span class="n">${r.fatti}</span> eseguiti</span>`+
    `<span class="pill ko"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg><span class="n">${r.nonfatti}</span> non eseguiti</span>`+
    `<span class="pill todo"><span class="n">${r.dafare}</span> da fare</span>`;
  const chips = CROCETTE.filter(c=>r.lav[c]).map(c=>`<span class="lav">${LAV_LABEL[c]} <b>${r.lav[c]}</b></span>`).join('');
  $('#lavrow').innerHTML = chips || `<span class="lav subtle">Nessuna lavorazione registrata</span>`;
  $('#pfill').style.width = Math.round(done/tot*100)+'%';
}

function fasciaBreve(s){ if(!s) return ''; const t=String(s).replace(/^\d{2}\/\d{2}\/\d{4}\s*/,'').trim(); return t||String(s).trim(); }

function renderList(){
  renderHeader();
  const rows = $('#rows'); rows.innerHTML='';
  VOCI.forEach((v,i)=>{
    if(filter==='dafare' && v.stato!=='dafare') return;
    if(filter==='fatti' && v.stato==='dafare') return;
    const b = document.createElement('button');
    b.className='row'; b.dataset.stato=v.stato; b.onclick=()=>openFocus(i);
    b.innerHTML = `
      <span class="num">${i+1}</span>
      <span class="rowmid">
        <span class="rownameline">
          <span class="rowname">${v.nome}</span>
          ${(v.attivita||v.fascia)?`<span class="rowmeta">${[v.attivita, fasciaBreve(v.fascia)].filter(Boolean).join(' · ')}</span>`:''}
        </span>
        <span class="rowsubline">
          <span class="rowsub">${v.via}<span class="dot">·</span>${v.comune}</span>
          <span class="chip ${v.stato}">${v.stato==='fatto'?'✓ ':''}${statoLabel[v.stato]}</span>
        </span>
      </span>
      <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 6l6 6-6 6"/></svg></span>`;
    rows.appendChild(b);
  });
  const {fatti,nonfatti}=riepilogo(); const rem = VOCI.length-(fatti+nonfatti);
  $('#abar').innerHTML = `
    ${rem>0
      ? `<div class="actionhint" onclick="setSeg('dafare')" style="cursor:pointer;text-decoration:underline">${rem} ${rem===1?'intervento da completare':'interventi da completare'} · tocca per filtrarli</div>`
      : `<div class="actionhint" style="color:var(--success)">Tutti gli interventi hanno un esito ✓</div>`}
    <div class="inner"><button class="btn btn-primary" ${rem>0?'disabled style="opacity:.45;cursor:not-allowed;box-shadow:none"':''}>Invia rapportino${rem>0?'':' ✓'}</button></div>`;
}

function setSeg(f){ filter=f; document.querySelectorAll('#seg button').forEach(b=>b.classList.toggle('on', b.dataset.f===f)); renderList(); }
document.querySelectorAll('#seg button').forEach(b=> b.onclick=()=>setSeg(b.dataset.f));

function openFocus(i){ current=i; renderFocus(); $('#list').classList.remove('active'); $('#focus').classList.add('active'); window.scrollTo(0,0); }
function toList(){ renderList(); $('#focus').classList.remove('active'); $('#list').classList.add('active'); }

function renderFocus(){
  const v = VOCI[current];
  $('#pos').textContent = `${current+1} / ${VOCI.length}`;
  const eseguitoVal = v.stato==='fatto'?'SI':(v.stato==='nonfatto'?'NO':'');
  const c = $('#fcard'); c.dataset.stato=v.stato;
  c.innerHTML = `
    <div class="ftop">
      <div class="ftitle">${v.nome}</div>
      ${v.stato!=='dafare'?'<span class="savebadge">salvato ✓</span>':''}
    </div>
    <div class="summary">
      <div class="line"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg><span>${v.via}, ${v.comune}</span></div>
      <div class="line"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span>${v.fascia}</span></div>
    </div>

    <details class="dett">
      <summary>Dettagli anagrafici
        <span class="twist"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span>
      </summary>
      <div class="grid">
        <div><div class="k">Matricola</div><div class="v">${v.matricola}</div></div>
        <div><div class="k">PDR</div><div class="v">${v.pdr}</div></div>
        <div><div class="k">ODSIN</div><div class="v">${v.odsin}</div></div>
        <div><div class="k">CAP</div><div class="v">${v.cap}</div></div>
        <div><div class="k">Recapito</div><div class="v">${v.recapito}</div></div>
        <div><div class="k">Attività</div><div class="v">${v.attivita}</div></div>
        <div><div class="k">Accessibilità</div><div class="v">${v.access}</div></div>
      </div>
    </details>

    <div class="fields">
      <div>
        <label class="flabel">Eseguito</label>
        <select id="eseguito" class="${eseguitoVal==='SI'?'eseguito-si':(eseguitoVal==='NO'?'eseguito-no':'')}" onchange="onEseguito(this.value)">
          <option value="" ${eseguitoVal===''?'selected':''}>— Seleziona —</option>
          <option value="SI" ${eseguitoVal==='SI'?'selected':''}>SI</option>
          <option value="NO" ${eseguitoVal==='NO'?'selected':''}>NO</option>
        </select>
      </div>
      <div>
        <label class="flabel">Lavorazioni</label>
        <div class="checks">
          ${CROCETTE.map(n=>`<div class="check ${v.lav&&v.lav[n]?'on':''}" onclick="toggleLav('${n}',this)">
            <span class="box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg></span>${LAV_LABEL[n]}</div>`).join('')}
        </div>
      </div>
      <div>
        <label class="flabel">Note</label>
        <textarea rows="2" placeholder="Annotazioni (facoltative)"></textarea>
      </div>
    </div>`;

  $('#abar').innerHTML = `<div class="inner">
      <button class="btn-ghost" onclick="nav(-1)" ${current===0?'disabled style=opacity:.4':''}>‹</button>
      <button class="btn btn-primary" onclick="saveNext()">${current===VOCI.length-1?'Salva e torna alla lista':'Salva e avanti ›'}</button>
    </div>`;
}

function onEseguito(val){
  VOCI[current].stato = val==='SI'?'fatto':(val==='NO'?'nonfatto':'dafare');
  const sel = $('#eseguito'); sel.classList.remove('eseguito-si','eseguito-no');
  if(val==='SI') sel.classList.add('eseguito-si'); if(val==='NO') sel.classList.add('eseguito-no');
  $('#fcard').dataset.stato = VOCI[current].stato;
  const sb = document.querySelector('.savebadge'); if(!sb && VOCI[current].stato!=='dafare'){ $('.ftop').insertAdjacentHTML('beforeend','<span class="savebadge">salvato ✓</span>'); }
  toast('Salvato ✓');
}
function toggleLav(name, el){ const v=VOCI[current]; v.lav=v.lav||{}; v.lav[name]=!v.lav[name]; el.classList.toggle('on', v.lav[name]); toast('Salvato ✓'); }
function nav(d){ const n=current+d; if(n>=0 && n<VOCI.length){ openFocus(n); } }
function saveNext(){ toast('Salvato ✓'); if(current===VOCI.length-1){ toList(); } else { setTimeout(()=>nav(1),150); } }

let tt; function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),1200); }

renderList();
</script>
</body>
</html>
